version: "3.9"

# Production overrides — use: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  strategy:
    restart: always
    environment:
      # ALPACA_MODE: production
      ALPACA_MODE: sandbox

  backend:
    restart: always
    environment:
      # NODE_ENV: production
      NODE_ENV: sandbox

  frontend:
    restart: always
    build:
      context: ./frontend
      # target: production
      target: sandbox
    environment:
      # NODE_ENV: production
      NODE_ENV: sandbox

  db:
    restart: always

  redis:
    restart: always

  nginx:
    restart: always
